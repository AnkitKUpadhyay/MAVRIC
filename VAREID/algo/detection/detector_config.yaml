# Detector Configuration

# Detection parameters
confidence_threshold: 0.45
save_threshold: 0.75

# Video processing
video_fps: 15              # UPDATED: 8 -> 15 fps for better tracking
video_max_frames: 5000
img_size_vid: 3008         # Keep high resolution for aerial footage

# Image processing (for non-video detections)
img_size_img: 320

# Tracker selection
# Options: "bytetrack.yaml", "botsort.yaml", or path to custom config
tracker: "bytetrack.yaml"    # NEW: Use BoT-SORT instead of ByteTrack